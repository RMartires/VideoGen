# Single source of truth for Manim segment types.
#
# Per-type keys:
#   category:   folder under segments/ that implements it
#   geometry:   participates in the "geometry story" (>=2 present => abstract dropped)
#   abstract:   dropped from specs that committed to a geometry story
#   enabled:    listed in the default LLM prompt (false => topic-gated by keywords)
#   priority:   existing | P0 | P1 | P2
#   source:     3b1b file the animation idea was ported from
#   llm_fields: literal JSON-shape string shown to the LLM
#   llm_hint:   trailing description shown to the LLM
#   keywords:   (gated types only) subject substrings that unlock the type

types:
  title_card:
    category: text
    geometry: false
    abstract: false
    enabled: true
    priority: existing
    source: ""
    llm_fields: '{ "title": str, "subtitle": str (optional), "narration_hint": str (optional) }'
    llm_hint: ""

  equation_reveal:
    category: text
    geometry: false
    abstract: false
    enabled: true
    priority: existing
    source: ""
    llm_fields: '{ "caption": str (optional), "equations": [LaTeX string, ...], "narration_hint": str }'
    llm_hint: "ANIMATED: equations write on one by one; with 2+ equations a highlight box hops between them"

  step_by_step:
    category: text
    geometry: false
    abstract: false
    enabled: true
    priority: existing
    source: ""
    llm_fields: '{ "title": str (optional), "steps": [str, ...], "narration_hint": str }'
    llm_hint: "ONE step per segment when possible; steps reveal one-by-one with animation"

  bullet_points:
